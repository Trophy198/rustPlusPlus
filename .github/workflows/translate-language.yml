name: Translate language files

on:
  push:
    branches:
      - master
    paths:
      - "src/languages/en.json"
      - "src/external/translate_language_json.py"
      - ".github/workflows/translate-language.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translate-master
  cancel-in-progress: true

jobs:
  translate-language:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run translation script
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          python translate_language_json.py \
            --source src/languages/en.json \
            --output-dir src/languages \
            --provider deepl

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/languages/*.json

          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi

          git commit -m "chore(i18n): update translations"
          git push